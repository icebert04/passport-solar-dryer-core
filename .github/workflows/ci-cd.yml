name: 🐢 Passport Turtles CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Codebase
      uses: actions/checkout@v3

    - name: Set up Python Runtime Environemnt
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic requests

    - name: Run Syntax Quality Check (Linting)
      run: |
        # This checks for structural errors or missing definitions before allowing a merge
        python -m py_compile backend/main.py
